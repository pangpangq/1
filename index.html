<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>舒尔特方格 · 专注力训练</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 全局滚动控制：默认允许滚动，由 .no-scroll 类禁止滚动（游戏页面时动态添加） */
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            background: #eef2f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: auto; /* 常规可滚动 */
            transition: overflow 0.1s;
        }
        
        /* 禁止滚动类：游戏页面激活时添加到body，彻底禁用滚动条与滚动行为 */
        body.no-scroll {
            overflow: hidden;
            position: fixed;      /* 防止移动端橡皮筋效果，配合touchmove拦截更稳定 */
            width: 100%;
            height: 100%;
        }

        .page {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .page.hide {
            display: none;
        }

        /* 选择页样式 */
        .select-content {
            padding: 32px 24px 40px;
            text-align: center;
        }

        .select-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .select-sub {
            color: #5f7e9c;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .size-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .size-card {
            background: #f4f8fe;
            border-radius: 28px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c5f8a;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #dce7f2;
            min-width: 70px;
        }

        .size-card.active {
            background: #2c5f8a;
            color: white;
            border-color: #2c5f8a;
            box-shadow: 0 6px 12px rgba(44, 95, 138, 0.2);
        }

        .btn-start {
            background: #2c5f8a;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 60px;
            width: 80%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn-start:active {
            transform: scale(0.97);
            background: #1f4a6e;
        }

        /* 游戏页样式 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 12px;
            border-bottom: 1px solid #edf2f7;
        }

        .back-btn {
            background: #f0f4fa;
            border: none;
            font-size: 1.2rem;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            color: #2c5f8a;
            cursor: pointer;
        }

        .game-size-badge {
            font-weight: 600;
            background: #eef2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #1f4a6e;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            background: #fafcff;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 10px 16px;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #e9f0f5;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #7b96b5;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e3a5f;
            font-feature-settings: 'tnum';
            line-height: 1.2;
        }

        .best-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f8a4c;
        }

        .grid-wrapper {
            padding: 20px 24px;
        }

        .grid {
            display: grid;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #f9fcff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #1e2f41;
            border: 1px solid #e0ecf5;
            transition: all 0.1s ease;
            cursor: pointer;
            font-family: monospace;
        }

        .cell.highlight {
            background: #fff3cf;
            border-color: #f7b32b;
            color: #b25d00;
            box-shadow: 0 4px 12px rgba(247, 179, 43, 0.2);
            transform: scale(0.98);
        }

        .game-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 8px 24px 24px;
        }

        .action-game-btn {
            background: #f0f4fa;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: #2c5f8a;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        .action-game-btn:active {
            transform: scale(0.97);
        }

        /* 悬浮提示 */
        .completion-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #2a6b47, #1e8f5a);
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 1rem;
            text-align: center;
            white-space: nowrap;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            pointer-events: none;
            transition: opacity 0.2s ease;
            opacity: 0;
        }
        
        .completion-toast.show {
            opacity: 1;
        }
        
        @media (max-width: 550px) {
            .completion-toast {
                bottom: 85px;
                white-space: normal;
                max-width: 85vw;
                text-align: center;
                line-height: 1.4;
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 450px) {
            .completion-toast {
                bottom: 75px;
                max-width: 90vw;
            }
        }

        @media (max-width: 500px) {
            .cell {
                font-size: 1.2rem;
                border-radius: 14px;
            }
            .grid {
                gap: 8px;
            }
            .stat-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div id="selectPage" class="page">
    <div class="select-content">
        <div class="select-title">舒尔特方格</div>
        <div class="select-sub">选择方格规模 · 开始专注挑战</div>
        <div class="size-options" id="sizeOptions"></div>
        <button class="btn-start" id="startGameBtn">▶ 开始训练</button>
    </div>
</div>

<div id="gamePage" class="page hide">
    <div class="game-header">
        <button class="back-btn" id="backToSelectBtn">← 返回</button>
        <span class="game-size-badge" id="gameSizeBadge">5x5</span>
    </div>
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">本次用时</div>
            <div class="stat-value" id="currentTimeDisplay">0.00 s</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">历史最佳</div>
            <div class="stat-value best-value" id="bestRecordDisplay">—</div>
        </div>
    </div>
    <div class="grid-wrapper">
        <div class="grid" id="gameGrid"></div>
    </div>
    <div class="game-actions">
        <button class="action-game-btn" id="shuffleGameBtn">🔄 重置</button>
    </div>
</div>

<div id="completionToast" class="completion-toast"></div>

<script>
    // DOM 元素
    const selectPage = document.getElementById('selectPage');
    const gamePage = document.getElementById('gamePage');
    const sizeOptionsDiv = document.getElementById('sizeOptions');
    const startGameBtn = document.getElementById('startGameBtn');
    const backToSelectBtn = document.getElementById('backToSelectBtn');
    const gameGrid = document.getElementById('gameGrid');
    const currentTimeDisplay = document.getElementById('currentTimeDisplay');
    const bestRecordDisplay = document.getElementById('bestRecordDisplay');
    const shuffleGameBtn = document.getElementById('shuffleGameBtn');
    const gameSizeBadge = document.getElementById('gameSizeBadge');
    const completionToast = document.getElementById('completionToast');

    // 游戏核心状态
    let currentSize = 5;
    let gridNumbers = [];
    let nextNumber = 1;
    let maxNumber = 25;
    let gameStarted = false;
    let gameCompleted = false;
    let startTime = 0;
    let timerInterval = null;
    let lastHighlightedCell = null;      // 记录当前高亮格子

    // 历史最佳存储 key 前缀
    const BEST_KEY_PREFIX = 'schulte_best_';
    let completionTimeoutId = null;

    // ========== 禁止滚动相关 ==========
    // 全局触摸拦截标志：只要游戏页面可见（未隐藏）就阻止滚动
    // 初始化时添加一次 touchmove 监听，在回调中根据游戏页面是否隐藏来决定是否 preventDefault
    // 同时配合 body 的 .no-scroll 类达到样式 + 行为双保险
    let touchMoveHandler = null;
    
    function initScrollLock() {
        // 创建 touchmove 拦截器 (非passive确保可阻止)
        touchMoveHandler = function(e) {
            // 游戏页面可见（没有 .hide 类）则阻止滚动
            if (gamePage && !gamePage.classList.contains('hide')) {
                e.preventDefault();
            }
        };
        // 绑定事件，使用 { passive: false } 确保能够调用 preventDefault
        document.body.addEventListener('touchmove', touchMoveHandler, { passive: false });
        // 额外对滚轮事件做轻度拦截（桌面端，同样确保游戏时无法滚动）
        // 但是滚轮可能干扰较少，添加wheel事件拦截保证体验统一
        document.body.addEventListener('wheel', function(e) {
            if (gamePage && !gamePage.classList.contains('hide')) {
                e.preventDefault();
            }
        }, { passive: false });
    }
    
    // 更新 body 的 no-scroll 类，配合 touchmove 彻底锁滚动
    function setBodyScrollLock(lock) {
        if (lock) {
            document.body.classList.add('no-scroll');
        } else {
            document.body.classList.remove('no-scroll');
        }
    }
    
    // 游戏页面显示时调用：锁定滚动 + 样式锁定
    function enableGameScrollLock() {
        setBodyScrollLock(true);
    }
    
    // 返回选择页时调用：解锁滚动
    function disableGameScrollLock() {
        setBodyScrollLock(false);
    }

    // ---------- 辅助函数 ----------
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function hideCompletionToast() {
        if (completionTimeoutId) {
            clearTimeout(completionTimeoutId);
            completionTimeoutId = null;
        }
        completionToast.classList.remove('show');
    }

    function showCompletionMessage(message, isNewRecord = false) {
        if (completionTimeoutId) clearTimeout(completionTimeoutId);
        let displayMsg = isNewRecord ? message + ' 🎉 新纪录！' : message;
        completionToast.textContent = displayMsg;
        completionToast.classList.add('show');
        completionTimeoutId = setTimeout(() => {
            completionToast.classList.remove('show');
            completionTimeoutId = null;
        }, 2800);
    }

    function startTiming() {
        if (timerInterval) stopTimer();
        gameStarted = true;
        startTime = performance.now();
        timerInterval = setInterval(() => {
            if (!gameStarted || gameCompleted) return;
            const now = performance.now();
            const elapsed = (now - startTime) / 1000;
            currentTimeDisplay.innerText = elapsed.toFixed(2) + ' s';
        }, 40);
    }

    function getBestTimeForSize(size) {
        const key = BEST_KEY_PREFIX + size + 'x' + size;
        const best = localStorage.getItem(key);
        return best ? parseFloat(best) : null;
    }

    function updateBestDisplay() {
        const best = getBestTimeForSize(currentSize);
        if (best !== null && isFinite(best)) {
            bestRecordDisplay.innerText = best.toFixed(2) + ' s';
        } else {
            bestRecordDisplay.innerText = '——';
        }
    }

    function trySaveNewRecord(completedTime) {
        const key = BEST_KEY_PREFIX + currentSize + 'x' + currentSize;
        const currentBest = getBestTimeForSize(currentSize);
        if (currentBest === null || completedTime < currentBest) {
            localStorage.setItem(key, completedTime);
            updateBestDisplay();
            return true;
        }
        return false;
    }

    function completeGame() {
        if (gameCompleted) return;
        gameCompleted = true;
        if (gameStarted) {
            stopTimer();
            const timeText = currentTimeDisplay.innerText;
            const finalTime = parseFloat(timeText.split(' ')[0]);
            if (!isNaN(finalTime)) {
                const isNewRecord = trySaveNewRecord(finalTime);
                showCompletionMessage(`✨ 完成！ ${currentSize}x${currentSize} 用时 ${finalTime.toFixed(2)} 秒 ✨`, isNewRecord);
            } else {
                showCompletionMessage(`🎉 挑战成功！ ${currentSize}x${currentSize}`, false);
            }
        } else {
            showCompletionMessage(`🎉 完成！ ${currentSize}x${currentSize}`, false);
        }
    }

    // 高效高亮：只移除上一个高亮，添加当前高亮
    function setHighlight(cell) {
        if (lastHighlightedCell === cell) return;
        if (lastHighlightedCell) {
            lastHighlightedCell.classList.remove('highlight');
        }
        cell.classList.add('highlight');
        lastHighlightedCell = cell;
    }

    function clearAllHighlights() {
        if (lastHighlightedCell) {
            lastHighlightedCell.classList.remove('highlight');
            lastHighlightedCell = null;
        }
    }

    // 正确点击处理
    function handleCorrectClick(cell, clickedNum) {
        if (!gameStarted && clickedNum === 1) {
            startTiming();
        }
        setHighlight(cell);
        nextNumber++;
        if (nextNumber > maxNumber) {
            completeGame();
        }
    }

    // 错误点击：无额外反馈（静默）
    function handleWrongClick() {}

    // 渲染网格
    function renderGameGrid() {
        const size = currentSize;
        gameGrid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        gameGrid.innerHTML = '';
        for (let i = 0; i < gridNumbers.length; i++) {
            const num = gridNumbers[i];
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.textContent = num;
            cell.dataset.value = num;
            gameGrid.appendChild(cell);
        }
        clearAllHighlights();
    }

    // 重置游戏状态 (保留当前size，重新生成数字)
    function resetGame(resetNumbers = true) {
        stopTimer();
        hideCompletionToast();
        gameStarted = false;
        gameCompleted = false;
        startTime = 0;
        nextNumber = 1;
        currentTimeDisplay.innerText = '0.00 s';
        clearAllHighlights();
        
        if (resetNumbers) {
            gridNumbers = generateRandomNumbers(currentSize);
            maxNumber = currentSize * currentSize;
        }
        renderGameGrid();
    }

    // 重置/洗牌 统一使用重置功能 (原“洗牌”逻辑不变)
    function reshuffleGame() {
        resetGame(true);
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function generateRandomNumbers(n) {
        const total = n * n;
        const arr = Array.from({ length: total }, (_, i) => i + 1);
        return shuffleArray(arr);
    }

    function initGamePageWithSize(size) {
        hideCompletionToast();
        currentSize = size;
        maxNumber = size * size;
        nextNumber = 1;
        gameStarted = false;
        gameCompleted = false;
        startTime = 0;
        stopTimer();
        currentTimeDisplay.innerText = '0.00 s';
        gridNumbers = generateRandomNumbers(size);
        renderGameGrid();
        gameSizeBadge.innerText = `${size}x${size}`;
        updateBestDisplay();
        clearAllHighlights();
    }

    // 显示游戏页面 —— 同时锁定滚动
    function showGamePage() {
        hideCompletionToast();
        selectPage.classList.add('hide');
        gamePage.classList.remove('hide');
        // 游戏页面显示时，锁定滚动（防止任何上下滑动）
        enableGameScrollLock();
    }

    // 显示选择页面 —— 恢复滚动
    function showSelectPage() {
        stopTimer();
        hideCompletionToast();
        selectPage.classList.remove('hide');
        gamePage.classList.add('hide');
        // 返回到选择页面时，解锁滚动
        disableGameScrollLock();
    }

    // ---------- 选择页尺寸按钮 ----------
    let selectedSize = 5;
    function buildSizeOptions() {
        sizeOptionsDiv.innerHTML = '';
        for (let i = 3; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'size-card';
            if (i === selectedSize) btn.classList.add('active');
            btn.textContent = `${i} x ${i}`;
            btn.dataset.size = i;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.size-card').forEach(card => card.classList.remove('active'));
                btn.classList.add('active');
                selectedSize = i;
            });
            sizeOptionsDiv.appendChild(btn);
        }
    }

    function startGame() {
        initGamePageWithSize(selectedSize);
        showGamePage();
    }

    function backToSelect() {
        showSelectPage();
    }

    // ---------- 事件绑定 (高效委托) ----------
    function setupGameGridListener() {
        gameGrid.addEventListener('click', (e) => {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            if (gameCompleted) return;
            
            const clickedNum = parseInt(cell.dataset.value, 10);
            if (clickedNum === nextNumber) {
                handleCorrectClick(cell, clickedNum);
            } else {
                handleWrongClick();
            }
        });
    }

    function bindGlobalEvents() {
        startGameBtn.addEventListener('click', startGame);
        backToSelectBtn.addEventListener('click', backToSelect);
        shuffleGameBtn.addEventListener('click', () => {
            if (!gamePage.classList.contains('hide')) {
                reshuffleGame();
            }
        });
        setupGameGridListener();
    }

    // 页面初始化
    function init() {
        buildSizeOptions();
        bindGlobalEvents();
        // 初始显示选择页，确保滚动解锁
        showSelectPage();
        initGamePageWithSize(5);
        // 确保选择页选中样式
        document.querySelectorAll('.size-card').forEach(card => {
            if (parseInt(card.dataset.size, 10) === 5) card.classList.add('active');
        });
        selectedSize = 5;
        hideCompletionToast();
        
        // 启动全局滚动拦截（基于游戏页面是否隐藏）
        initScrollLock();
        // 额外确保一开始未锁定滚动（选择页状态）
        disableGameScrollLock();
    }
    
    init();
</script>
</body>
</html>
